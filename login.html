<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4B Crane - Login</title>
    <link rel="stylesheet" href="index.css" />
    <!-- Tailwind CDN for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- custom styles moved into utilities; keeping markup classes for fallbacks -->
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div
      class="login-container bg-white p-8 rounded-lg shadow-lg w-full max-w-md"
    >
      <div class="login-header text-center mb-10">
        <h1 class="text-2xl font-extrabold text-gray-900 mb-2">4B Crane</h1>
        <p class="text-gray-600 text-sm">Sign in to your account</p>
      </div>

      <form action="/login" method="POST">
        <div class="form-group mb-6">
          <label for="email" class="block font-medium text-gray-700 mb-1"
            >Email Address</label
          >
          <input
            id="email"
            name="email"
            type="email"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded focus:border-red-600 focus:ring-red-200"
          />
        </div>

        <div class="form-group mb-6">
          <label for="password" class="block font-medium text-gray-700 mb-1"
            >Password</label
          >
          <input
            id="password"
            name="password"
            type="password"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded focus:border-red-600 focus:ring-red-200"
          />
        </div>

        <button
          class="login-button w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded font-semibold transition"
          type="submit"
        >
          Sign In
        </button>
      </form>

      <div class="login-footer text-center mt-6 text-gray-500 text-sm">
        <p>© 2026 4B Crane. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
